<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - 3D Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.875rem 1rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .new-chat-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 0.25rem;
        }

        .conversation-item:hover {
            background: rgba(71, 85, 105, 0.5);
        }

        .conversation-item.active {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }

        .conversation-item svg {
            width: 1.25rem;
            height: 1.25rem;
            flex-shrink: 0;
        }

        .conversation-title {
            flex: 1;
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            opacity: 0;
            padding: 0.25rem;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .conversation-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #f87171;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .user-avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-email {
            font-size: 0.875rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .signout-btn {
            width: 100%;
            padding: 0.75rem;
            background: rgba(51, 65, 85, 0.5);
            border: none;
            border-radius: 0.5rem;
            color: #94a3b8;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }

        .signout-btn:hover {
            background: rgba(51, 65, 85, 0.8);
            color: #e2e8f0;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
        }

        .chat-header {
            height: 4rem;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.5);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .chat-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(51, 65, 85, 0.7);
            border-bottom-left-radius: 0.25rem;
        }

        .message-content {
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .thinking-message {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            background: rgba(51, 65, 85, 0.7);
            border-radius: 1rem;
            align-self: flex-start;
        }

        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .empty-icon {
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.75rem;
        }

        .empty-text {
            color: #64748b;
        }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            gap: 0.75rem;
        }

        .message-input {
            flex: 1;
            padding: 0.875rem 1rem;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .message-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .message-input::placeholder {
            color: #64748b;
        }

        .send-btn {
            padding: 0.875rem 1.25rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            border: none;
            border-radius: 0.75rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Auth Screen */
        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 28rem;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1.25rem;
            padding: 2.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle {
            color: #64748b;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(51, 65, 85, 0.5);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.75rem;
            padding: 0.875rem 1rem;
            color: #fca5a5;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #00d4ff 0%, #0088ff 100%);
            border: none;
            border-radius: 0.75rem;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
        }

        .auth-switch-btn {
            background: none;
            border: none;
            color: #00d4ff;
            font-size: 0.875rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .auth-switch-btn:hover {
            color: #00b8e6;
            text-decoration: underline;
        }

        /* Loading Screen */
        .loading-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .loading-spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: #64748b;
            font-size: 1rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.5);
        }

        /* SVG Icons */
        .icon {
            width: 1.5rem;
            height: 1.5rem;
        }

        .icon-sm {
            width: 1rem;
            height: 1rem;
        }

        .icon-lg {
            width: 2rem;
            height: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 100;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .message {
                max-width: 85%;
            }
        }

        /* Gradient Overlay */
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 0%, rgba(15, 23, 42, 0.3) 50%, rgba(15, 23, 42, 0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>
    <div class="gradient-overlay"></div>

    <!-- Main App Container -->
    <div id="app"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://yxnnvwipbrodqpyaxuuf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bm52d2lwYnJvZHFweWF4dXVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDQ1NTcsImV4cCI6MjA5NTQ4MDU1N30.yArG2pr9c1Bu2FTwj14tD8AFbDjYs3hSFWqu1djnmU0';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // App State
        let currentUser = null;
        let conversations = [];
        let currentConversation = null;
        let messages = [];
        let isLoading = false;

        // 3D Background Setup
        function init3DBackground() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            camera.position.z = 6;

            // Particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 2000;
            const positions = new Float32Array(particlesCount * 3);

            for (let i = 0; i < particlesCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 20;
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                color: 0x00d4ff,
                size: 0.02,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);

            // Glowing Sphere (Wireframe Icosahedron)
            const sphereGeometry = new THREE.IcosahedronGeometry(1.5, 1);
            const sphereMaterial = new THREE.MeshBasicMaterial({
                color: 0x0088ff,
                wireframe: true,
                transparent: true,
                opacity: 0.6
            });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            scene.add(sphere);

            // Orbital Rings
            const ring1Geometry = new THREE.TorusGeometry(2.5, 0.02, 16, 100);
            const ring1Material = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.8 });
            const ring1 = new THREE.Mesh(ring1Geometry, ring1Material);
            scene.add(ring1);

            const ring2Geometry = new THREE.TorusGeometry(3, 0.015, 16, 100);
            const ring2Material = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.6 });
            const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
            scene.add(ring2);

            const ring3Geometry = new THREE.TorusGeometry(3.5, 0.01, 16, 100);
            const ring3Material = new THREE.MeshBasicMaterial({ color: 0x0088ff, transparent: true, opacity: 0.4 });
            const ring3 = new THREE.Mesh(ring3Geometry, ring3Material);
            scene.add(ring3);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x00d4ff, 1, 100);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00ff88, 0.5, 100);
            pointLight2.position.set(-10, -10, -10);
            scene.add(pointLight2);

            // Animation
            function animate() {
                requestAnimationFrame(animate);

                const time = Date.now() * 0.001;

                particles.rotation.x = time * 0.05;
                particles.rotation.y = time * 0.08;

                sphere.position.y = Math.sin(time * 0.5) * 0.3;
                sphere.rotation.x = time * 0.2;
                sphere.rotation.z = time * 0.1;

                ring1.rotation.x = time * 0.3;
                ring1.rotation.y = time * 0.2;

                ring2.rotation.x = time * 0.4 + 1;
                ring2.rotation.z = time * 0.3;

                ring3.rotation.y = time * 0.2;
                ring3.rotation.z = time * 0.4 + 2;

                renderer.render(scene, camera);
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Initialize 3D Background
        init3DBackground();

        // SVG Icons
        const icons = {
            plus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
            message: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`,
            trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
            send: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>`,
            logout: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>`,
            user: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`,
            loader: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`
        };

        // Auth Functions
        async function handleAuth(e, isLogin) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            const submitBtn = document.querySelector('.submit-btn');

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.classList.add('show');
                return;
            }

            errorEl.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner" style="width: 20px; height: 20px;"></span> Processing...`;

            try {
                const { error } = isLogin
                    ? await supabase.auth.signInWithPassword({ email, password })
                    : await supabase.auth.signUp({ email, password });

                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = 'An error occurred';
                errorEl.classList.add('show');
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = isLogin ? 'Sign In' : 'Create Account';
        }

        async function handleSignOut() {
            await supabase.auth.signOut();
            currentUser = null;
            renderApp();
        }

        // Render Auth Screen
        function renderAuthScreen() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div class="auth-header">
                            <h1 class="auth-title">AI Chatbot</h1>
                            <p class="auth-subtitle">Sign in to continue your conversations</p>
                        </div>

                        <div id="auth-error" class="error-message"></div>

                        <form id="auth-form">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input id="email" type="email" class="form-input" placeholder="you@example.com" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Password</label>
                                <input id="password" type="password" class="form-input" placeholder="Min 6 characters" required>
                            </div>

                            <button type="submit" class="submit-btn">Sign In</button>
                        </form>

                        <div class="auth-switch">
                            <button class="auth-switch-btn" id="switch-auth">Don't have an account? Sign up</button>
                        </div>
                    </div>
                </div>
            `;

            let isLogin = true;

            document.getElementById('auth-form').addEventListener('submit', (e) => handleAuth(e, isLogin));

            document.getElementById('switch-auth').addEventListener('click', () => {
                isLogin = !isLogin;
                document.querySelector('.auth-subtitle').textContent = isLogin
                    ? 'Sign in to continue your conversations'
                    : 'Start your AI journey today';
                document.querySelector('.submit-btn').textContent = isLogin ? 'Sign In' : 'Create Account';
                document.getElementById('switch-auth').textContent = isLogin
                    ? "Don't have an account? Sign up"
                    : 'Already have an account? Sign in';
            });
        }

        // Render Chat App
        function renderChatApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="app-container">
                    <!-- Sidebar -->
                    <div class="sidebar">
                        <div class="sidebar-header">
                            <button class="new-chat-btn" id="new-chat-btn">
                                <span class="icon icon-sm">${icons.plus}</span>
                                New Chat
                            </button>
                        </div>

                        <div class="conversations-list" id="conversations-list">
                            <div style="text-align: center; padding: 2rem; color: #64748b;">
                                <span class="spinner" style="margin: 0 auto;"></span>
                            </div>
                        </div>

                        <div class="sidebar-footer">
                            <div class="user-info">
                                <div class="user-avatar">
                                    <span class="icon icon-sm" style="color: white;">${icons.user}</span>
                                </div>
                                <span class="user-email">${currentUser?.email || ''}</span>
                            </div>
                            <button class="signout-btn" id="signout-btn">
                                <span class="icon icon-sm">${icons.logout}</span>
                                Sign Out
                            </button>
                        </div>
                    </div>

                    <!-- Chat Area -->
                    <div class="chat-area">
                        <div class="chat-header">
                            <h2 class="chat-title" id="chat-title">New Chat</h2>
                        </div>

                        <div class="messages-container" id="messages-container">
                            <div class="empty-state">
                                <div class="empty-icon">
                                    <span class="icon icon-lg" style="color: white;">${icons.message}</span>
                                </div>
                                <h3 class="empty-title">Start a conversation</h3>
                                <p class="empty-text">Type a message below to begin chatting with AI</p>
                            </div>
                        </div>

                        <div class="input-area">
                            <input type="text" class="message-input" id="message-input" placeholder="Type your message...">
                            <button class="send-btn" id="send-btn">
                                <span class="icon icon-sm">${icons.send}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `;

            // Event Listeners
            document.getElementById('new-chat-btn').addEventListener('click', createNewConversation);
            document.getElementById('signout-btn').addEventListener('click', handleSignOut);
            document.getElementById('send-btn').addEventListener('click', sendMessage);
            document.getElementById('message-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !isLoading) sendMessage();
            });

            // Load conversations
            loadConversations();
        }

        // Load Conversations
        async function loadConversations() {
            const { data, error } = await supabase
                .from('conversations')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('updated_at', { ascending: false });

            if (!error && data) {
                conversations = data;
                renderConversationsList();

                if (conversations.length > 0) {
                    currentConversation = conversations[0];
                    document.getElementById('chat-title').textContent = currentConversation.title;
                    loadMessages(currentConversation.id);
                }
            } else {
                renderConversationsList();
            }
        }

        // Render Conversations List
        function renderConversationsList() {
            const container = document.getElementById('conversations-list');

            if (conversations.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #64748b; padding: 1rem; font-size: 0.875rem;">No conversations yet</p>';
                return;
            }

            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${currentConversation?.id === conv.id ? 'active' : ''}" data-id="${conv.id}">
                    <span class="icon icon-sm">${icons.message}</span>
                    <span class="conversation-title">${conv.title}</span>
                    <button class="delete-btn" data-delete-id="${conv.id}">
                        <span class="icon icon-sm">${icons.trash}</span>
                    </button>
                </div>
            `).join('');

            // Add click listeners
            container.querySelectorAll('.conversation-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    const id = item.dataset.id;
                    currentConversation = conversations.find(c => c.id === id);
                    document.getElementById('chat-title').textContent = currentConversation.title;
                    loadMessages(id);
                    renderConversationsList();
                });
            });

            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteConversation(btn.dataset.deleteId);
                });
            });
        }

        // Create New Conversation
        async function createNewConversation() {
            const { data, error } = await supabase
                .from('conversations')
                .insert({ user_id: currentUser.id, title: 'New Chat' })
                .select()
                .single();

            if (!error && data) {
                conversations.unshift(data);
                currentConversation = data;
                messages = [];
                document.getElementById('chat-title').textContent = 'New Chat';
                renderConversationsList();
                renderMessages();
            }
        }

        // Delete Conversation
        async function deleteConversation(id) {
            const { error } = await supabase.from('conversations').delete().eq('id', id);

            if (!error) {
                conversations = conversations.filter(c => c.id !== id);

                if (currentConversation?.id === id) {
                    currentConversation = conversations.length > 0 ? conversations[0] : null;
                    messages = [];

                    if (currentConversation) {
                        document.getElementById('chat-title').textContent = currentConversation.title;
                        loadMessages(currentConversation.id);
                    } else {
                        document.getElementById('chat-title').textContent = 'New Chat';
                        renderMessages();
                    }
                }

                renderConversationsList();
            }
        }

        // Load Messages
        async function loadMessages(conversationId) {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .eq('conversation_id', conversationId)
                .order('created_at', { ascending: true });

            if (!error && data) {
                messages = data;
                renderMessages();
            }
        }

        // Render Messages
        function renderMessages() {
            const container = document.getElementById('messages-container');

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <span class="icon icon-lg" style="color: white;">${icons.message}</span>
                        </div>
                        <h3 class="empty-title">Start a conversation</h3>
                        <p class="empty-text">Type a message below to begin chatting with AI</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-content">${msg.content}</div>
                    <div class="message-time">${formatTime(msg.created_at)}</div>
                </div>
            `).join('');

            if (isLoading) {
                container.innerHTML += `
                    <div class="thinking-message">
                        <div class="spinner"></div>
                        <span>Thinking...</span>
                    </div>
                `;
            }

            container.scrollTop = container.scrollHeight;
        }

        // Send Message
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const userMessage = input.value.trim();

            if (!userMessage || isLoading || !currentConversation) return;

            input.value = '';
            isLoading = true;

            // Save user message
            const { data: savedUserMsg } = await supabase
                .from('messages')
                .insert({
                    conversation_id: currentConversation.id,
                    role: 'user',
                    content: userMessage
                })
                .select()
                .single();

            if (savedUserMsg) {
                messages.push(savedUserMsg);
            }

            // Update conversation title if first message
            if (currentConversation.title === 'New Chat' && userMessage) {
                const title = userMessage.slice(0, 30) + (userMessage.length > 30 ? '...' : '');
                await supabase.from('conversations').update({ title }).eq('id', currentConversation.id);
                currentConversation.title = title;
                document.getElementById('chat-title').textContent = title;
                loadConversations();
            }

            renderMessages();

            // Call AI API
            try {
                const response = await fetch(`${SUPABASE_URL}/functions/v1/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    },
                    body: JSON.stringify({
                        message: userMessage,
                        conversation_history: messages.slice(0, -1).map(m => ({
                            role: m.role,
                            content: m.content
                        }))
                    })
                });

                const data = await response.json();

                let aiResponse = data.response;
                if (!aiResponse) {
                    aiResponse = data.error || 'Failed to get AI response. Please try again.';
                }

                // Save AI message
                const { data: savedAiMsg } = await supabase
                    .from('messages')
                    .insert({
                        conversation_id: currentConversation.id,
                        role: 'assistant',
                        content: aiResponse
                    })
                    .select()
                    .single();

                if (savedAiMsg) {
                    messages.push(savedAiMsg);
                }
            } catch (err) {
                const { data: errorMsg } = await supabase
                    .from('messages')
                    .insert({
                        conversation_id: currentConversation.id,
                        role: 'assistant',
                        content: 'Connection error. Please check your network and try again.'
                    })
                    .select()
                    .single();

                if (errorMsg) {
                    messages.push(errorMsg);
                }
            }

            isLoading = false;
            renderMessages();
        }

        // Format Time
        function formatTime(dateString) {
            return new Date(dateString).toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Render Loading Screen
        function renderLoadingScreen() {
            document.getElementById('app').innerHTML = `
                <div class="loading-screen">
                    <div class="loading-spinner"></div>
                    <p class="loading-text">Loading...</p>
                </div>
            `;
        }

        // Main Render Function
        function renderApp() {
            if (currentUser === undefined) {
                renderLoadingScreen();
            } else if (!currentUser) {
                renderAuthScreen();
            } else {
                renderChatApp();
            }
        }

        // Check Auth State
        async function initApp() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            renderApp();

            supabase.auth.onAuthStateChange((event, session) => {
                currentUser = session?.user || null;
                renderApp();
            });
        }

        // Initialize
        initApp();
    </script>
</body>
</html>
