<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova AI - 3D AI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(20, 20, 30, 0.8);
      --text-primary: #f0f0f5;
      --text-secondary: #8888aa;
      --accent-cyan: #00d4ff;
      --accent-purple: #a855f7;
      --accent-pink: #ff6b9d;
      --glow-cyan: rgba(0, 212, 255, 0.3);
      --glow-purple: rgba(168, 85, 247, 0.3);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .main-container {
      display: flex;
      height: 100vh;
      padding-top: 60px;
    }

    .scene-container {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, var(--bg-primary) 70%);
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .character-name {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    .character-name h2 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .character-name p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .chat-container {
      width: 450px;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-left: 1px solid rgba(0, 212, 255, 0.1);
    }

    .chat-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .chat-header h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .chat-header p {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      box-shadow: 0 0 15px var(--glow-cyan);
    }

    .message.user .message-avatar {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
    }

    .message-content {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
    }

    .message.assistant .message-content {
      background: var(--bg-card);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 16px 16px 16px 4px;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
      border-radius: 16px 16px 4px 16px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--accent-cyan);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      padding: 8px;
      transition: all 0.3s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .input-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      padding: 8px 12px;
    }

    .input-wrapper input::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .welcome-message {
      text-align: center;
      padding: 40px 20px;
    }

    .welcome-message h4 {
      font-size: 20px;
      margin-bottom: 8px;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-message p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-cyan);
      border-radius: 50%;
      opacity: 0.5;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      50% { transform: translateY(-100px) translateX(30px); }
    }

    @media (max-width: 900px) {
      .main-container {
        flex-direction: column;
      }

      .scene-container {
        height: 40vh;
      }

      .chat-container {
        width: 100%;
        flex: 1;
      }

      .character-name {
        bottom: 20px;
      }

      .character-name h2 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">
      <div class="logo-icon">N</div>
      <span class="logo-text">Nova AI</span>
    </div>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online</span>
    </div>
  </header>

  <div class="main-container">
    <div class="scene-container">
      <div id="canvas-container"></div>
      <div class="particles" id="particles"></div>
      <div class="character-name">
        <h2>Nova</h2>
        <p>Your AI Assistant</p>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-header">
        <h3>Chat with Nova</h3>
        <p>Ask me anything, I am here to help!</p>
      </div>

      <div class="messages-container" id="messages">
        <div class="welcome-message">
          <h4>Hello! I am Nova</h4>
          <p>I am your friendly AI assistant. Feel free to ask me anything - from general questions to coding help, creative writing, or just a casual chat!</p>
        </div>
      </div>

      <div class="input-area">
        <form class="input-wrapper" id="chat-form">
          <input 
            type="text" 
            id="message-input" 
            placeholder="Type your message..." 
            autocomplete="off"
          >
          <button type="submit" class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // Create Particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (6 + Math.random() * 4) + 's';
      if (Math.random() > 0.5) {
        particle.style.background = '#a855f7';
      }
      particlesContainer.appendChild(particle);
    }

    // Three.js Scene
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0x00d4ff, 1, 100);
    mainLight.position.set(2, 3, 4);
    scene.add(mainLight);

    const purpleLight = new THREE.PointLight(0xa855f7, 0.8, 100);
    purpleLight.position.set(-3, -2, 3);
    scene.add(purpleLight);

    // Character Group
    const characterGroup = new THREE.Group();
    scene.add(characterGroup);

    // Body
    const bodyGeometry = new THREE.SphereGeometry(1, 32, 32);
    const bodyMaterial = new THREE.MeshPhongMaterial({
      color: 0x2a2a3e,
      shininess: 100,
      specular: 0x00d4ff
    });
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    characterGroup.add(body);

    // Eyes
    const eyeGeometry = new THREE.SphereGeometry(0.18, 16, 16);
    const eyeMaterial = new THREE.MeshPhongMaterial({
      color: 0x00d4ff,
      emissive: 0x00d4ff,
      emissiveIntensity: 0.8
    });

    const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    leftEye.position.set(-0.3, 0.2, 0.85);
    characterGroup.add(leftEye);

    const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
    rightEye.position.set(0.3, 0.2, 0.85);
    characterGroup.add(rightEye);

    // Pupils
    const pupilGeometry = new THREE.SphereGeometry(0.08, 16, 16);
    const pupilMaterial = new THREE.MeshBasicMaterial({ color: 0x0a0a0f });

    const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
    leftPupil.position.set(-0.3, 0.2, 1);
    characterGroup.add(leftPupil);

    const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
    rightPupil.position.set(0.3, 0.2, 1);
    characterGroup.add(rightPupil);

    // Cheeks (blush)
    const cheekGeometry = new THREE.CircleGeometry(0.12, 16);
    const cheekMaterial = new THREE.MeshBasicMaterial({ 
      color: 0xff6b9d, 
      transparent: true, 
      opacity: 0.6 
    });

    const leftCheek = new THREE.Mesh(cheekGeometry, cheekMaterial);
    leftCheek.position.set(-0.55, -0.1, 0.87);
    leftCheek.rotation.y = 0.3;
    characterGroup.add(leftCheek);

    const rightCheek = new THREE.Mesh(cheekGeometry, cheekMaterial);
    rightCheek.position.set(0.55, -0.1, 0.87);
    rightCheek.rotation.y = -0.3;
    characterGroup.add(rightCheek);

    // Antenna
    const antennaStalkGeometry = new THREE.CylinderGeometry(0.03, 0.05, 0.4, 8);
    const antennaMaterial = new THREE.MeshPhongMaterial({ color: 0x2a2a3e });
    const antennaStalk = new THREE.Mesh(antennaStalkGeometry, antennaMaterial);
    antennaStalk.position.set(0, 1.1, 0);
    characterGroup.add(antennaStalk);

    const antennaBallGeometry = new THREE.SphereGeometry(0.1, 16, 16);
    const antennaBallMaterial = new THREE.MeshPhongMaterial({
      color: 0x00d4ff,
      emissive: 0x00d4ff,
      emissiveIntensity: 0.5
    });
    const antennaBall = new THREE.Mesh(antennaBallGeometry, antennaBallMaterial);
    antennaBall.position.set(0, 1.35, 0);
    characterGroup.add(antennaBall);

    // Glow Rings
    const ringGeometry = new THREE.TorusGeometry(1.5, 0.02, 8, 64);
    const ringMaterial = new THREE.MeshBasicMaterial({ 
      color: 0x00d4ff, 
      transparent: true, 
      opacity: 0.3 
    });

    const ring1 = new THREE.Mesh(ringGeometry, ringMaterial);
    ring1.rotation.x = Math.PI / 2;
    ring1.position.y = -0.5;
    characterGroup.add(ring1);

    const ring2Geometry = new THREE.TorusGeometry(1.8, 0.015, 8, 64);
    const ring2Material = new THREE.MeshBasicMaterial({ 
      color: 0xa855f7, 
      transparent: true, 
      opacity: 0.2 
    });
    const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
    ring2.rotation.x = Math.PI / 2;
    ring2.position.y = -0.7;
    characterGroup.add(ring2);

    // Animation state
    let isSpeaking = false;
    let isThinking = false;
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;

      // Floating animation
      characterGroup.position.y = Math.sin(time * 0.8) * 0.15;
      characterGroup.rotation.y = Math.sin(time * 0.3) * 0.1;

      // Ring rotation
      ring1.rotation.z = time * 0.3;
      ring2.rotation.z = -time * 0.2;

      // Speaking animation
      if (isSpeaking) {
        const speakScale = 1 + Math.sin(time * 15) * 0.03;
        body.scale.set(speakScale, 1 / speakScale, speakScale);
      } else {
        body.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
      }

      // Thinking animation (antenna wobble)
      if (isThinking) {
        antennaBall.position.x = Math.sin(time * 8) * 0.1;
        antennaBallMaterial.emissiveIntensity = 0.5 + Math.sin(time * 10) * 0.3;
      } else {
        antennaBall.position.x = 0;
        antennaBallMaterial.emissiveIntensity = 0.5;
      }

      // Eye glow pulse
      eyeMaterial.emissiveIntensity = 0.6 + Math.sin(time * 2) * 0.2;

      renderer.render(scene, camera);
    }

    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // Chat functionality
    const messagesContainer = document.getElementById('messages');
    const chatForm = document.getElementById('chat-form');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    const messages = [];

    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'assistant' ? 'N' : 'U';
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);
      
      const welcome = messagesContainer.querySelector('.welcome-message');
      if (welcome) welcome.remove();
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      
      return contentDiv;
    }

    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typing-message';
      
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'N';
      
      const indicator = document.createElement('div');
      indicator.className = 'message-content';
      indicator.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      
      typingDiv.appendChild(avatar);
      typingDiv.appendChild(indicator);
      messagesContainer.appendChild(typingDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing-message');
      if (typing) typing.remove();
    }

    // Simple AI responses (client-side)
    const responses = [
      "That's a great question! I'd be happy to help you with that.",
      "Interesting! Let me think about that for a moment...",
      "I understand what you're asking. Here's my perspective on it.",
      "That's something I find fascinating too! Would you like to explore it further?",
      "Great thought! I have some ideas that might help.",
      "I'm here to assist! Let me provide some insights.",
      "That's a wonderful topic to discuss. Here's what I think...",
      "I appreciate you asking! Let me share my thoughts.",
    ];

    async function sendMessage(content) {
      addMessage('user', content);
      messages.push({ role: 'user', content });

      showTyping();
      isThinking = true;

      await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1500));

      isThinking = false;
      isSpeaking = true;
      removeTyping();

      const response = responses[Math.floor(Math.random() * responses.length)] + 
        ` You said: "${content.substring(0, 50)}${content.length > 50 ? '...' : ''}"`;

      addMessage('assistant', response);
      messages.push({ role: 'assistant', content: response });

      setTimeout(() => {
        isSpeaking = false;
      }, 2000);
    }

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const content = messageInput.value.trim();
      if (!content) return;

      messageInput.value = '';
      sendBtn.disabled = true;

      await sendMessage(content);

      sendBtn.disabled = false;
      messageInput.focus();
    });

    messageInput.focus();
  </script>
</body>
</html>
