<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - 3D Avatar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00f5ff;
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Main container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00f5ff, #bf00ff, #00f5ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        @keyframes gradient {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .header p {
            color: #888;
            margin-top: 8px;
        }

        /* API Key Section */
        .api-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .api-section input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            width: 300px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .api-section input:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        .api-section button {
            background: linear-gradient(135deg, #00f5ff, #bf00ff);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .api-section button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Main content area */
        .main-content {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 3D Avatar container */
        .avatar-container {
            width: 350px;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.1);
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 245, 255, 0.1), transparent 30%);
            animation: rotate 10s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        #avatar-canvas {
            position: relative;
            z-index: 1;
        }

        .speaking-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .speaking-indicator.active {
            opacity: 1;
        }

        .speaking-indicator span {
            width: 8px;
            height: 8px;
            background: #00f5ff;
            border-radius: 50%;
            animation: bounce 1s ease-in-out infinite;
        }

        .speaking-indicator span:nth-child(2) { animation-delay: 0.1s; }
        .speaking-indicator span:nth-child(3) { animation-delay: 0.2s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Chat container */
        .chat-container {
            flex: 1;
            min-width: 350px;
            max-width: 600px;
            height: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(191, 0, 255, 0.1);
        }

        .chat-header {
            padding: 15px 20px;
            background: rgba(0, 245, 255, 0.1);
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00f5ff, #bf00ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header-info h3 {
            font-size: 16px;
            color: #fff;
        }

        .chat-header-info span {
            font-size: 12px;
            color: #00ff88;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0, 245, 255, 0.3);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #bf00ff, #8000ff);
            border-bottom-right-radius: 5px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(0, 245, 255, 0.15);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-bottom-left-radius: 5px;
        }

        .message p {
            font-size: 14px;
            line-height: 1.5;
        }

        .message .time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 15px 20px;
            background: rgba(0, 245, 255, 0.1);
            border-radius: 15px;
            border-bottom-left-radius: 5px;
        }

        .typing-indicator.active {
            display: flex;
            gap: 5px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #00f5ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Chat input */
        .chat-input {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(0, 245, 255, 0.2);
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #00f5ff;
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .chat-input button {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #00f5ff, #bf00ff);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .chat-input button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .chat-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .chat-input button svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .main-content {
                flex-direction: column;
                align-items: center;
            }

            .avatar-container {
                width: 280px;
                height: 320px;
            }

            .chat-container {
                min-width: 100%;
                height: 450px;
            }

            .api-section input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>AI Assistant</h1>
            <p>Your intelligent 3D companion powered by OpenAI</p>
        </div>

        <!-- API Key Section -->
        <div class="api-section">
            <input type="password" id="apiKey" placeholder="Enter your OpenAI API Key (sk-...)" />
            <button onclick="connectAPI()">Connect</button>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Not Connected</span>
            </div>
        </div>

        <!-- Main content -->
        <div class="main-content">
            <!-- 3D Avatar -->
            <div class="avatar-container">
                <canvas id="avatar-canvas"></canvas>
                <div class="speaking-indicator" id="speakingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <!-- Chat -->
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-header-icon">AI</div>
                    <div class="chat-header-info">
                        <h3>AI Assistant</h3>
                        <span id="aiStatus">Ready to chat</span>
                    </div>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="message ai">
                        <p>Hello! I am your AI assistant. Please connect your OpenAI API key to start chatting with me. How can I help you today?</p>
                        <div class="time">Just now</div>
                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)" />
                    <button onclick="sendMessage()" id="sendBtn">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // Configuration
        // ============================================
        let API_KEY = '';
        let isConnected = false;
        let isSpeaking = false;
        let scene, camera, renderer, head, leftEye, rightEye, mouth;
        let mouseX = 0, mouseY = 0;

        // ============================================
        // Create floating particles
        // ============================================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // ============================================
        // Three.js 3D Avatar Setup
        // ============================================
        function init3DAvatar() {
            const canvas = document.getElementById('avatar-canvas');
            const container = canvas.parentElement;

            // Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const frontLight = new THREE.DirectionalLight(0x00f5ff, 1);
            frontLight.position.set(0, 0, 5);
            scene.add(frontLight);

            const backLight = new THREE.DirectionalLight(0xbf00ff, 0.5);
            backLight.position.set(0, 0, -5);
            scene.add(backLight);

            const topLight = new THREE.PointLight(0x00f5ff, 0.8, 10);
            topLight.position.set(0, 3, 2);
            scene.add(topLight);

            // Create human head
            const headGeometry = new THREE.SphereGeometry(1, 32, 32);
            headGeometry.scale(0.85, 1, 0.9);
            const headMaterial = new THREE.MeshPhongMaterial({
                color: 0x1a1a3a,
                emissive: 0x0a0a1a,
                specular: 0x00f5ff,
                shininess: 30
            });
            head = new THREE.Mesh(headGeometry, headMaterial);
            scene.add(head);

            // Create face outline glow
            const faceGlowGeometry = new THREE.SphereGeometry(1.02, 32, 32);
            faceGlowGeometry.scale(0.85, 1, 0.9);
            const faceGlowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00f5ff,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const faceGlow = new THREE.Mesh(faceGlowGeometry, faceGlowMaterial);
            scene.add(faceGlow);

            // Create eyes
            const eyeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const eyeMaterial = new THREE.MeshPhongMaterial({
                color: 0x00f5ff,
                emissive: 0x00f5ff,
                emissiveIntensity: 0.8
            });

            leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-0.3, 0.15, 0.75);
            scene.add(leftEye);

            rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(0.3, 0.15, 0.75);
            scene.add(rightEye);

            // Eye pupils
            const pupilGeometry = new THREE.SphereGeometry(0.07, 16, 16);
            const pupilMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });

            const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            leftPupil.position.set(0, 0, 0.1);
            leftEye.add(leftPupil);

            const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
            rightPupil.position.set(0, 0, 0.1);
            rightEye.add(rightPupil);

            // Create mouth
            const mouthGeometry = new THREE.TorusGeometry(0.2, 0.05, 8, 16, Math.PI);
            const mouthMaterial = new THREE.MeshPhongMaterial({
                color: 0xbf00ff,
                emissive: 0xbf00ff,
                emissiveIntensity: 0.5
            });
            mouth = new THREE.Mesh(mouthGeometry, mouthMaterial);
            mouth.position.set(0, -0.35, 0.7);
            mouth.rotation.x = Math.PI;
            scene.add(mouth);

            // Create circuit lines on face
            const circuitMaterial = new THREE.LineBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0.5 });
            
            // Left circuit
            const leftCircuit = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-0.6, 0.5, 0.6),
                new THREE.Vector3(-0.7, 0.2, 0.5),
                new THREE.Vector3(-0.65, -0.1, 0.55),
                new THREE.Vector3(-0.5, -0.3, 0.65)
            ]);
            scene.add(new THREE.Line(leftCircuit, circuitMaterial));

            // Right circuit
            const rightCircuit = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0.6, 0.5, 0.6),
                new THREE.Vector3(0.7, 0.2, 0.5),
                new THREE.Vector3(0.65, -0.1, 0.55),
                new THREE.Vector3(0.5, -0.3, 0.65)
            ]);
            scene.add(new THREE.Line(rightCircuit, circuitMaterial));

            // Add floating ring around head
            const ringGeometry = new THREE.TorusGeometry(1.5, 0.02, 8, 64);
            const ringMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00f5ff, 
                transparent: true, 
                opacity: 0.5 
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.3;
            scene.add(ring);

            // Mouse tracking
            document.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            // Animation loop
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Idle floating animation
            const time = Date.now() * 0.001;
            head.position.y = Math.sin(time) * 0.1;
            head.rotation.y = Math.sin(time * 0.5) * 0.1;

            // Eye tracking
            const targetX = mouseX * 0.3;
            const targetY = mouseY * 0.2;
            leftEye.rotation.y = targetX;
            leftEye.rotation.x = -targetY;
            rightEye.rotation.y = targetX;
            rightEye.rotation.x = -targetY;

            // Speaking animation
            if (isSpeaking) {
                mouth.scale.y = 1 + Math.sin(time * 15) * 0.5;
                leftEye.material.emissiveIntensity = 0.5 + Math.sin(time * 10) * 0.3;
                rightEye.material.emissiveIntensity = 0.5 + Math.sin(time * 10) * 0.3;
            } else {
                mouth.scale.y = 1;
                leftEye.material.emissiveIntensity = 0.8;
                rightEye.material.emissiveIntensity = 0.8;
            }

            // Blinking
            if (Math.random() < 0.005) {
                leftEye.scale.y = 0.1;
                rightEye.scale.y = 0.1;
                setTimeout(() => {
                    leftEye.scale.y = 1;
                    rightEye.scale.y = 1;
                }, 150);
            }

            renderer.render(scene, camera);
        }

        // ============================================
        // API Connection
        // ============================================
        function connectAPI() {
            const apiKeyInput = document.getElementById('apiKey');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            API_KEY = apiKeyInput.value.trim();

            if (!API_KEY || !API_KEY.startsWith('sk-')) {
                alert('Please enter a valid OpenAI API key (starts with sk-)');
                return;
            }

            isConnected = true;
            statusDot.classList.add('connected');
            statusText.textContent = 'Connected';
            document.getElementById('aiStatus').textContent = 'Online - Ready to help';

            // Add welcome message
            addMessage('ai', 'Great! I am now connected and ready to assist you. Feel free to ask me anything!');
        }

        // ============================================
        // Chat Functions
        // ============================================
        function addMessage(type, text) {
            const messagesContainer = document.getElementById('chatMessages');
            const message = document.createElement('div');
            message.className = `message ${type}`;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            message.innerHTML = `
                <p>${text}</p>
                <div class="time">${time}</div>
            `;

            messagesContainer.appendChild(message);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            if (!isConnected) {
                alert('Please connect your OpenAI API key first!');
                return;
            }

            // Add user message
            addMessage('user', message);
            input.value = '';

            // Show typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            const speakingIndicator = document.getElementById('speakingIndicator');
            typingIndicator.classList.add('active');

            // Disable send button
            document.getElementById('sendBtn').disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are a helpful, friendly AI assistant. Keep your responses concise and helpful. You can respond in both English and Hindi based on the user\'s language.'
                            },
                            {
                                role: 'user',
                                content: message
                            }
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Hide typing, show speaking
                typingIndicator.classList.remove('active');
                speakingIndicator.classList.add('active');
                isSpeaking = true;

                const aiMessage = data.choices[0].message.content;
                
                // Simulate typing effect delay
                setTimeout(() => {
                    addMessage('ai', aiMessage);
                    speakingIndicator.classList.remove('active');
                    isSpeaking = false;
                }, 500);

            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage('ai', `Error: ${error.message}. Please check your API key and try again.`);
            }

            document.getElementById('sendBtn').disabled = false;
        }

        // ============================================
        // Resize handler
        // ============================================
        window.addEventListener('resize', () => {
            const container = document.getElementById('avatar-canvas').parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // ============================================
        // Initialize
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
