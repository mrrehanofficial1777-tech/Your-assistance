<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MR7 AI</title>


<!-- Highlight.js for code highlighting -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<!-- Marked for markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Three.js for 3D background -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root{
    --bg:#0d0d0d;
    --panel:#171717;
    --panel-2:#202020;
    --border:#2a2a2a;
    --text:#ececec;
    --muted:#9a9a9a;
    --accent:#10a37f;
    --user-bubble:#2f2f2f;
  }
  html,body{height:100%;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
  }
  #bg-canvas{
    position:fixed;inset:0;z-index:0;opacity:.45;
  }
  .app{
    position:relative;z-index:1;
    display:flex;height:100vh;width:100vw;
  }

  /* Sidebar */
  .sidebar{
    width:260px;background:rgba(10,10,10,.85);
    backdrop-filter:blur(8px);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    transition:margin-left .25s;
  }
  .sidebar.hidden{margin-left:-260px;}
  .sb-header{padding:12px;border-bottom:1px solid var(--border);}
  .new-chat-btn{
    width:100%;padding:10px 12px;background:transparent;
    color:var(--text);border:1px solid var(--border);
    border-radius:8px;cursor:pointer;font-size:14px;
    display:flex;align-items:center;gap:8px;justify-content:center;
    transition:background .15s;
  }
  .new-chat-btn:hover{background:var(--panel-2);}
  .chat-list{flex:1;overflow-y:auto;padding:8px;}
  .chat-item{
    padding:10px 12px;border-radius:8px;cursor:pointer;
    font-size:13px;color:var(--muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;justify-content:space-between;gap:6px;
    margin-bottom:2px;
  }
  .chat-item:hover{background:var(--panel-2);color:var(--text);}
  .chat-item.active{background:var(--panel-2);color:var(--text);}
  .chat-item .del{
    opacity:0;background:none;border:none;color:var(--muted);
    cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;
  }
  .chat-item:hover .del{opacity:1;}
  .chat-item .del:hover{background:#3a1f1f;color:#ff6b6b;}
  .sb-footer{
    padding:10px 12px;border-top:1px solid var(--border);
    font-size:11px;color:var(--muted);text-align:center;
  }

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .topbar{
    height:52px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 16px;gap:12px;
    background:rgba(13,13,13,.7);backdrop-filter:blur(8px);
  }
  .icon-btn{
    background:none;border:none;color:var(--text);
    cursor:pointer;padding:6px 10px;border-radius:6px;font-size:18px;
  }
  .icon-btn:hover{background:var(--panel-2);}
  .brand{font-weight:600;letter-spacing:.5px;}
  .brand span{color:var(--accent);}

  /* Messages */
  .messages{
    flex:1;overflow-y:auto;padding:24px 0;
  }
  .msg-wrap{
    width:100%;padding:18px 16px;
  }
  .msg-wrap.assistant{background:rgba(255,255,255,.02);}
  .msg{
    max-width:760px;margin:0 auto;display:flex;gap:14px;align-items:flex-start;
  }
  .avatar{
    width:30px;height:30px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;flex-shrink:0;
  }
  .avatar.user{background:#5436da;color:#fff;}
  .avatar.assistant{background:var(--accent);color:#fff;}
  .msg-body{flex:1;min-width:0;line-height:1.65;font-size:15px;}
  .msg-body p{margin:0 0 10px;}
  .msg-body p:last-child{margin-bottom:0;}
  .msg-body ul,.msg-body ol{margin:8px 0 8px 22px;}
  .msg-body code{
    background:#1f1f1f;padding:2px 6px;border-radius:4px;
    font-family:'Consolas',monospace;font-size:13.5px;
  }
  .msg-body pre{
    background:#0a0a0a;border:1px solid var(--border);
    border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;
  }
  .msg-body pre code{background:transparent;padding:0;font-size:13px;}
  .msg-body a{color:var(--accent);}
  .typing{display:inline-block;width:8px;height:16px;background:var(--text);animation:blink 1s infinite;vertical-align:middle;}
  @keyframes blink{50%{opacity:0;}}

  /* Welcome */
  .welcome{
    height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:20px;
  }
  .welcome h1{
    font-size:42px;font-weight:700;margin-bottom:12px;
    background:linear-gradient(135deg,#fff,#10a37f);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .welcome p{color:var(--muted);max-width:480px;}
  .suggestions{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:30px;
    max-width:600px;width:100%;
  }
  .sg{
    padding:14px;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;cursor:pointer;text-align:left;font-size:13.5px;
    color:var(--muted);transition:all .15s;
  }
  .sg:hover{background:var(--panel-2);color:var(--text);}

  /* Composer */
  .composer-wrap{
    padding:14px 16px 18px;background:linear-gradient(to top,var(--bg) 70%,transparent);
  }
  .composer{
    max-width:760px;margin:0 auto;
    display:flex;align-items:flex-end;gap:8px;
    background:var(--panel);border:1px solid var(--border);
    border-radius:14px;padding:10px 10px 10px 14px;
  }
  .composer textarea{
    flex:1;background:transparent;border:none;color:var(--text);
    resize:none;outline:none;font-family:inherit;font-size:15px;
    max-height:200px;min-height:24px;line-height:1.5;padding:4px 0;
  }
  .send-btn{
    background:var(--accent);border:none;color:#fff;
    width:34px;height:34px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:16px;
    transition:opacity .15s;
  }
  .send-btn:disabled{background:#444;cursor:not-allowed;}
  .composer-hint{
    text-align:center;font-size:11px;color:var(--muted);
    margin-top:8px;
  }

  /* API key banner */
  .api-banner{
    background:#3a2118;color:#ffb4a2;
    padding:10px 16px;text-align:center;font-size:13px;
    border-bottom:1px solid #5a2f24;
  }
  .api-banner code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;}

  /* Scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:#444;}

  @media(max-width:768px){
    .sidebar{position:absolute;height:100%;z-index:5;}
    .welcome h1{font-size:32px;}
    .suggestions{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <button class="new-chat-btn" onclick="newChat()">＋ New chat</button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sb-footer">MR7 AI · v1.0</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <div class="brand">MR7<span> AI</span></div>
    </div>

    <!-- API key warning banner (auto shows if key missing) -->
    <div class="api-banner" id="apiBanner" style="display:none;">
      ⚠️ API key missing. Open <code>index.html</code> and paste your OpenAI API key in the <code>OPENAI_API_KEY</code> variable at the top of the &lt;script&gt; section.
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="input" placeholder="Message MR7 AI..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
          oninput="autoGrow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <div class="composer-hint">MR7 AI can make mistakes. Verify important info.</div>
    </div>
  </main>
</div>

<script>
/* =========================================================
   ⚠️  YAHA APNI OPENAI API KEY DALO  ⚠️
   Without API key the chatbot will NOT work.
   Get key from: https://platform.openai.com/api-keys
   ========================================================= */
const OPENAI_API_KEY = "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"; // <-- YAHA API KEY PASTE KARO (e.g. "sk-...")
const OPENAI_MODEL   = "gpt-4o-mini"; // change if needed: gpt-4o, gpt-3.5-turbo, etc.
/* ========================================================= */


/* ---------- State ---------- */
let chats = JSON.parse(localStorage.getItem("mr7_chats") || "{}");
let currentChatId = localStorage.getItem("mr7_current") || null;
let isStreaming = false;

/* ---------- Init ---------- */
window.addEventListener("DOMContentLoaded", () => {
  if (!OPENAI_API_KEY || !OPENAI_API_KEY.startsWith("sk-")) {
    document.getElementById("apiBanner").style.display = "block";
  }
  if (!currentChatId || !chats[currentChatId]) {
    newChat();
  } else {
    renderChatList();
    renderMessages();
  }
});

/* ---------- Chat management ---------- */
function newChat(){
  const id = "c_" + Date.now();
  chats[id] = { id, title: "New chat", messages: [] };
  currentChatId = id;
  persist();
  renderChatList();
  renderMessages();
  document.getElementById("input").focus();
}

function switchChat(id){
  currentChatId = id;
  localStorage.setItem("mr7_current", id);
  renderChatList();
  renderMessages();
}

function deleteChat(id, ev){
  ev.stopPropagation();
  if(!confirm("Delete this chat?")) return;
  delete chats[id];
  if(currentChatId === id){
    const ids = Object.keys(chats);
    currentChatId = ids[0] || null;
    if(!currentChatId) newChat();
  }
  persist();
  renderChatList();
  renderMessages();
}

function persist(){
  localStorage.setItem("mr7_chats", JSON.stringify(chats));
  localStorage.setItem("mr7_current", currentChatId);
}

/* ---------- Renderers ---------- */
function renderChatList(){
  const list = document.getElementById("chatList");
  const ids = Object.keys(chats).reverse();
  list.innerHTML = ids.map(id => `
    <div class="chat-item ${id===currentChatId?'active':''}" onclick="switchChat('${id}')">
      <span>💬 ${escapeHtml(chats[id].title)}</span>
      <button class="del" onclick="deleteChat('${id}',event)">✕</button>
    </div>
  `).join("");
}

function renderMessages(){
  const box = document.getElementById("messages");
  const chat = chats[currentChatId];
  if(!chat || chat.messages.length === 0){
    box.innerHTML = `
      <div class="welcome">
        <h1>MR7 AI</h1>
        <p>Your futuristic AI assistant. Ask anything — code, ideas, explanations.</p>
        <div class="suggestions">
          <div class="sg" onclick="useSg(this)">Explain quantum computing simply</div>
          <div class="sg" onclick="useSg(this)">Write a Python script to scrape a webpage</div>
          <div class="sg" onclick="useSg(this)">Give me 5 startup ideas for 2026</div>
          <div class="sg" onclick="useSg(this)">Help me plan a 3-day Goa trip</div>
        </div>
      </div>`;
    return;
  }
  box.innerHTML = chat.messages.map(m => renderMsg(m)).join("");
  hljs.highlightAll();
  box.scrollTop = box.scrollHeight;
}

function renderMsg(m){
  const isUser = m.role === "user";
  const content = isUser ? `<p>${escapeHtml(m.content).replace(/\n/g,"<br>")}</p>` : marked.parse(m.content||"");
  return `
    <div class="msg-wrap ${isUser?'user':'assistant'}">
      <div class="msg">
        <div class="avatar ${isUser?'user':'assistant'}">${isUser?'You':'AI'}</div>
        <div class="msg-body">${content}</div>
      </div>
    </div>`;
}

function useSg(el){
  document.getElementById("input").value = el.textContent;
  sendMessage();
}

/* ---------- Send ---------- */
async function sendMessage(){
  if(isStreaming) return;
  const inp = document.getElementById("input");
  const text = inp.value.trim();
  if(!text) return;

  if(!OPENAI_API_KEY || !OPENAI_API_KEY.startsWith("sk-")){
    alert("⚠️ API key missing!\n\nOpen index.html and paste your OpenAI API key in the OPENAI_API_KEY variable at the top of the <script> section.\n\nGet key from: https://platform.openai.com/api-keys");
    return;
  }

  const chat = chats[currentChatId];
  chat.messages.push({ role:"user", content:text });
  if(chat.messages.length === 1){
    chat.title = text.slice(0, 30) + (text.length>30?"...":"");
  }
  inp.value = ""; autoGrow(inp);
  persist();
  renderChatList();
  renderMessages();

  // Add empty assistant message
  chat.messages.push({ role:"assistant", content:"" });
  renderMessages();
  const box = document.getElementById("messages");
  const lastBody = box.querySelectorAll(".msg-body");
  const targetEl = lastBody[lastBody.length-1];
  targetEl.innerHTML = '<span class="typing"></span>';

  isStreaming = true;
  document.getElementById("sendBtn").disabled = true;

  try{
    const resp = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: OPENAI_MODEL,
        stream: true,
        messages: [
          { role:"system", content:"You are MR7 AI, a helpful, friendly and concise AI assistant. Use markdown formatting and code blocks when appropriate." },
          ...chat.messages.filter(m=>m.content).map(m=>({role:m.role,content:m.content}))
        ]
      })
    });

    if(!resp.ok){
      const err = await resp.text();
      throw new Error(`API error ${resp.status}: ${err}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let assistantText = "";

    while(true){
      const { done, value } = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, { stream:true });
      let idx;
      while((idx = buffer.indexOf("\n")) !== -1){
        let line = buffer.slice(0, idx).trim();
        buffer = buffer.slice(idx+1);
        if(!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if(data === "[DONE]") continue;
        try{
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if(delta){
            assistantText += delta;
            chat.messages[chat.messages.length-1].content = assistantText;
            targetEl.innerHTML = marked.parse(assistantText) + '<span class="typing"></span>';
            box.scrollTop = box.scrollHeight;
          }
        }catch(e){ /* partial */ }
      }
    }

    targetEl.innerHTML = marked.parse(assistantText || "*(no response)*");
    hljs.highlightAll();
    persist();
  }catch(err){
    console.error(err);
    chat.messages[chat.messages.length-1].content = `❌ **Error:** ${err.message}\n\nCheck your API key and internet connection.`;
    targetEl.innerHTML = marked.parse(chat.messages[chat.messages.length-1].content);
    persist();
  }finally{
    isStreaming = false;
    document.getElementById("sendBtn").disabled = false;
  }
}

/* ---------- Helpers ---------- */
function autoGrow(el){
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 200) + "px";
}
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("hidden");
}
function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

/* =========================================================
   3D BACKGROUND (Three.js — floating particles)
   ========================================================= */
(function init3D(){
  const canvas = document.getElementById("bg-canvas");
  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 50;

  // Particles
  const count = 800;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count*3);
  for(let i=0;i<count*3;i++) positions[i] = (Math.random()-0.5)*120;
  geo.setAttribute("position", new THREE.BufferAttribute(positions,3));

  const mat = new THREE.PointsMaterial({
    color:0x10a37f, size:0.35, transparent:true, opacity:0.85,
    blending:THREE.AdditiveBlending
  });
  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // Floating wireframe shape
  const torusGeo = new THREE.TorusKnotGeometry(8, 1.8, 100, 12);
  const torusMat = new THREE.MeshBasicMaterial({ color:0x10a37f, wireframe:true, transparent:true, opacity:0.15 });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  scene.add(torus);

  let mouseX=0, mouseY=0;
  window.addEventListener("mousemove", e=>{
    mouseX = (e.clientX/window.innerWidth - 0.5)*2;
    mouseY = (e.clientY/window.innerHeight - 0.5)*2;
  });

  function animate(){
    requestAnimationFrame(animate);
    points.rotation.y += 0.0008;
    points.rotation.x += 0.0004;
    torus.rotation.x += 0.002;
    torus.rotation.y += 0.003;
    camera.position.x += (mouseX*3 - camera.position.x)*0.02;
    camera.position.y += (-mouseY*3 - camera.position.y)*0.02;
    camera.lookAt(scene.position);
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
