<style>
  :root {
    --accent: #10a37f;
    --accent-glow: rgba(16, 163, 127, 0.15);
    --bg-dark: #060608;
    --panel-dark: #0c0c10;
    --border-dark: rgba(255, 255, 255, 0.05);
    --text-dark: #f3f4f6;
    --text-muted: #8e939e;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-dark);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  body.light {
    --bg-dark: #f8fafc;
    --panel-dark: #ffffff;
    --border-dark: rgba(0, 0, 0, 0.08);
    --text-dark: #0f172a;
    --text-muted: #64748b;
  }

  h1, h2, h3, .font-heading {
    font-family: 'Space Grotesk', sans-serif;
  }

  /* Accent Color Classes */
  .color-accent { color: var(--accent); }
  .bg-accent { background-color: var(--accent); }
  .border-accent { border-color: var(--accent); }
  .shadow-accent-glow { box-shadow: 0 0 25px var(--accent-glow); }

  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.35;
    transition: opacity 0.5s;
  }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 99px;
  }
  body.light ::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.08);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  pre code {
    font-family: 'Fira Code', monospace !important;
  }

  /* Audio pulse animation */
  @keyframes pulse-audio {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.08); opacity: 1; color: #ef4444; }
  }
  .audio-playing {
    animation: pulse-audio 1.2s infinite;
  }

  /* Typing cursor */
  .typing-cursor::after {
    content: '_';
    animation: blink-cursor 0.8s infinite;
    color: var(--accent);
    font-weight: bold;
  }
  @keyframes blink-cursor {
    50% { opacity: 0; }
  }

  * {
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }

  /* Mobile overlay styling for backdrop */
  #sidebarOverlay {
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    transition: opacity 0.25s ease;
  }
</style>
</head>

<!-- Hidden global audio channel -->
<audio id="globalAudioPlayer" class="hidden"></audio>

<script>
// Dynamic Brand Re-naming Configuration Constants
const BRAND_NAME = "MR7 AI"; 
const BRAND_ACCENT = "AI";

// Embedded Proprietary Access Keys (Hardcoded behind the scenes)
const EM_QA_KEY = "AIzaSyDUgrnJTG0auhB8jm99aKpD7WTDr6P6V2Y"; 
const EM_VL_KEY = "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";

/* ---------- Autonomous Audio FX Engine ---------- */
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  try {
    const osc = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioContext.destination);

    if (type === 'click') {
      osc.frequency.setValueAtTime(580, audioContext.currentTime);
      osc.frequency.exponentialRampToValueAtTime(120, audioContext.currentTime + 0.08);
      gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
      osc.start();
      osc.stop(audioContext.currentTime + 0.08);
    } else if (type === 'success') {
      osc.frequency.setValueAtTime(450, audioContext.currentTime);
      osc.frequency.setValueAtTime(900, audioContext.currentTime + 0.07);
      gainNode.gain.setValueAtTime(0.03, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.22);
      osc.start();
      osc.stop(audioContext.currentTime + 0.22);
    } else if (type === 'error') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(140, audioContext.currentTime);
      osc.frequency.linearRampToValueAtTime(70, audioContext.currentTime + 0.25);
      gainNode.gain.setValueAtTime(0.04, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.25);
      osc.start();
      osc.stop(audioContext.currentTime + 0.25);
    }
  } catch (e) {
    console.debug("Audio system initialization bypassed: ", e);
  }
}

/* ---------- Local State variables ---------- */
let chats = JSON.parse(localStorage.getItem("mr7_v4_chats") || "{}");
let currentChatId = localStorage.getItem("mr7_v4_current") || null;
let currentPersona = localStorage.getItem("mr7_v4_persona") || "friendly";
let currentAccent = localStorage.getItem("mr7_v4_accent") || "#10a37f";
let currentAccentGlow = localStorage.getItem("mr7_v4_accent_glow") || "rgba(16,163,127,0.15)";
let activeVoice = localStorage.getItem("mr7_v4_voice") || "Kore";
let activeEngine = localStorage.getItem("mr7_v4_engine") || "groq"; // Default to Groq Velocity Core (Superfast)
let isGenerating = false;

let is3DActive = localStorage.getItem("mr7_v4_3d") !== "false";
let isLightMode = localStorage.getItem("mr7_v4_theme") === "light";

/* ---------- Native Speech Capture Web API ---------- */
let recognition = null;
let isListening = false;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechObj = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechObj();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'hi-IN'; // Multilingual Hindi/English integration

  recognition.onstart = () => {

async function sendMessage() {
  if (isGenerating) return;

  const inp = document.getElementById("input");
  let text = inp.value.trim();
  if (!text) return;

  const chat = chats[currentChatId];
  chat.messages.push({ role: "user", content: text });
  
  if (chat.messages.length === 1) {
    chat.title = text.length > 22 ? text.slice(0, 20) + "..." : text;
  }

  clearInput();
  saveChatsToLocal();
  renderChatList();
  renderMessages();

  // Create empty loader state bubble
  chat.messages.push({ role: "assistant", content: "" });
  saveChatsToLocal();
  
  const msgElements = document.getElementById("messages").querySelectorAll(".prose");
  const targetBubble = msgElements[msgElements.length - 1];
  targetBubble.innerHTML = '<span class="typing-cursor font-semibold text-emerald-400 font-mono text-xs md:text-sm">Synthesizing semantic tokens...</span>';

  isGenerating = true;
  document.getElementById("sendBtn").disabled = true;

  try {
    let responseText = "";
    if (activeEngine === "gemini") {
      responseText = await triggerQuantumTextAPI(chat.messages.slice(0, -1));
    } else {
      responseText = await triggerVelocityTextAPI(chat.messages.slice(0, -1));
    }
    chat.messages[chat.messages.length - 1].content = responseText;
  } catch (err) {
    console.error(err);
    playSound('error');
    
    // Friendly localized system failover message
    chat.messages[chat.messages.length - 1].content = `⚠️ **Kuch issue aa gaya:** Method doesn't allow unregistered callers (callers without established identity). Please use API Key or other form of API consumer identity to call this API.\n\nKripya check karein ki connection sahi hai ya thodi der baad try karein. Settings dashboard se direct Custom API key feed karke bypass kar sakte hain.`;
  } finally {
    isGenerating = false;
    document.getElementById("sendBtn").disabled = false;
    saveChatsToLocal();
    renderMessages();
  }
}

/* ---------- AI Speech Synthesizer Core ---------- */
let currentlyPlayingBtn = null;

async function ttsSpeak(btn, messageIndex) {
  const chat = chats[currentChatId];
  if (!chat || !chat.messages[messageIndex]) return;

  const textToRead = chat.messages[messageIndex].content.replace(/[\*\#\`\_]/g, "");
  const audioLabel = btn.querySelector(".audio-label");
  const audioIcon = btn.querySelector("i");
  const player = document.getElementById("globalAudioPlayer");

  if (currentlyPlayingBtn === btn) {
    player.pause();
    resetAudioButton(btn);
    currentlyPlayingBtn = null;
    return;
  }

  if (currentlyPlayingBtn) {
    currentlyPlayingBtn.click(); // Stop preceding playing speech elements
  }

  audioLabel.textContent = "Processing sound...";
  audioIcon.className = "fas fa-spinner fa-spin text-emerald-400";
  currentlyPlayingBtn = btn;

  try {
    const payload = {
      contents: [{
        parts: [{ text: `Speak in dynamic professional voice rate: ${textToRead.slice(0, 300)}` }]
      }],
      generationConfig: {
        responseModalities: ["AUDIO"],
        speechConfig: {
          voiceConfig: {
            prebuiltVoiceConfig: { voiceName: activeVoice }
          }
        }
      }
    };

    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${EM_QA_KEY}`;

    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!response.ok) throw new Error("Voice synthesizer disconnected.");

    const result = await response.json();
    const part = result?.candidates?.[0]?.content?.parts?.[0];
    const base64Audio = part?.inlineData?.data;
    const mimeType = part?.inlineData?.mimeType;

    if (base64Audio && mimeType) {
      const rawSampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
      const binaryPcm = base64ToArrayBuffer(base64Audio);
      const pcm16 = new Int16Array(binaryPcm);
      const wavBlob = pcmToWav(pcm16, rawSampleRate);
      
      const audioUrl = URL.createObjectURL(wavBlob);
      player.src = audioUrl;
      player.play();

      audioLabel.textContent = "Stop";
      audioIcon.className = "fas fa-stop-circle text-red-500 audio-playing";

      player.onended = () => {
        resetAudioButton(btn);
        currentlyPlayingBtn = null;
      };
    } else {
      throw new Error("Vocal sound buffers empty.");
    }
  } catch (err) {
    console.error(err);
    triggerToast("Audio Failed", "System Voice pipeline timed out.", "text-red-400");
    playSound('error');
    resetAudioButton(btn);
    currentlyPlayingBtn = null;
  }
}

function resetAudioButton(btn) {
  if (!btn) return;
  const audioLabel = btn.querySelector(".audio-label");
  const audioIcon = btn.querySelector("i");
  audioLabel.textContent = "Suniye (Audio)";
  audioIcon.className = "fas fa-volume-up text-xs text-emerald-400";
}

function pcmToWav(pcm16, sampleRate) {
  const buffer = new ArrayBuffer(44 + pcm16.length * 2);
  const view = new DataView(buffer);
  
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + pcm16.length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); 
  view.setUint16(22, 1, true); 
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); 
  view.setUint16(32, 2, true); 
  view.setUint16(34, 16, true); 
  writeString(view, 36, 'data');
  view.setUint32(40, pcm16.length * 2, true);

  let offset = 44;
  for (let i = 0; i < pcm16.length; i++, offset += 2) {
    view.setInt16(offset, pcm16[i], true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, string) {
  for (let i = 0; i < string.length; i++) {
    view.setUint8(offset + i, string.charCodeAt(i));
  }
}

function base64ToArrayBuffer(base64) {
  const binaryString = atob(base64);
  const len = binaryString.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) {
    bytes[i] = binaryString.charCodeAt(i);
  }
  return bytes.buffer;
}

  if (!chat || !chat.messages[index]) return;
  
  const text = chat.messages[index].content;
  const tempTextarea = document.createElement("textarea");
  tempTextarea.value = text;
  document.body.appendChild(tempTextarea);
  tempTextarea.select();
  try {
    document.execCommand('copy');
    btn.innerHTML = `<i class="fas fa-check text-emerald-400"></i> <span>Copied!</span>`;
    setTimeout(() => {
      btn.innerHTML = `<i class="fas fa-clone text-xs"></i> <span>Copy Text</span>`;
    }, 2000);
  } catch (err) {
    triggerToast("Buffer Error", "Failed to write content dynamically.", "text-red-400");
  }
  document.body.removeChild(tempTextarea);
}

function triggerToast(title, text, styleClass = "text-emerald-400") {
  const toast = document.getElementById("toast");
  const icon = document.getElementById("toast-icon");
  const msg = document.getElementById("toast-msg");
  
  if (styleClass.includes("red")) {
    icon.innerHTML = `<i class="fas fa-exclamation-circle text-red-400"></i>`;
  } else if (styleClass.includes("yellow")) {
    icon.innerHTML = `<i class="fas fa-info-circle text-yellow-400"></i>`;
  } else {
    icon.innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i>`;
  }

  msg.innerHTML = `<b>${title}</b>: ${text}`;
  toast.className = "fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-900/95 border border-white/10 text-white px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-md z-50 flex items-center gap-3 transition-all duration-300 pointer-events-auto opacity-100 scale-100 max-w-[90%] text-center";
  
  setTimeout(() => {
    toast.className = "fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-900/90 border border-white/10 text-white px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-md z-50 flex items-center gap-3 transition-all duration-300 pointer-events-none opacity-0 scale-95 max-w-[90%] text-center";
  }, 3500);
}

/* ---------- Custom Settings Controllers ---------- */
function openSettings() {
  document.getElementById("settingsModal").classList.remove("pointer-events-none", "opacity-0");
  document.getElementById("settingsModal").querySelector(".transform").classList.remove("scale-95");
  
  // Highlighting active Persona button
  const buttons = ["friendly", "coder", "writer", "expert"];
  buttons.forEach(p => {
    const el = document.getElementById(`p-${p}`);
    if (p === currentPersona) {
      el.className = "p-2.5 rounded-xl border border-emerald-500 bg-emerald-500/10 text-left flex flex-col gap-0.5 transition-all shadow-md font-sans";
    } else {
      el.className = "p-2.5 rounded-xl border border-white/5 hover:border-white/20 bg-white/5 text-left flex flex-col gap-0.5 transition-all font-sans";
    }
  });
}

function closeSettings() {
  document.getElementById("settingsModal").classList.add("pointer-events-none", "opacity-0");
  document.getElementById("settingsModal").querySelector(".transform").classList.add("scale-95");
}

function setPersona(p) {
  currentPersona = p;
  openSettings();
}

function setAccent(hex, glow) {
  currentAccent = hex;
  currentAccentGlow = glow;
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-glow', glow);
  triggerToast("Glow Spectrum", "Custom interface HUD palette adapted successfully.");
}

function saveAllSettings() {
  const activeEngineVal = document.getElementById("apiEngine").value;
  const selectedVoice = document.getElementById("ttsVoice").value;

  activeEngine = activeEngineVal;
  activeVoice = selectedVoice;

  localStorage.setItem("mr7_v4_engine", activeEngine);
  localStorage.setItem("mr7_v4_persona", currentPersona);
  localStorage.setItem("mr7_v4_voice", activeVoice);
  localStorage.setItem("mr7_v4_accent", currentAccent);
  localStorage.setItem("mr7_v4_accent_glow", currentAccentGlow);

  if (chats[currentChatId]) {
    chats[currentChatId].persona = currentPersona;
    saveChatsToLocal();
  }

  updatePersonaUI();
  updateEngineUI();
  closeSettings();
  renderMessages();
  triggerToast("Settings Synced", "Internal operational configuration updated.");
}

function resetSettings() {
  currentPersona = "friendly";
  currentAccent = "#10a37f";
  currentAccentGlow = "rgba(16,163,127,0.15)";
  activeVoice = "Kore";
  activeEngine = "groq";

  document.getElementById("apiEngine").value = "groq";
  document.getElementById("ttsVoice").value = "Kore";
  
  document.documentElement.style.setProperty('--accent', currentAccent);
  document.documentElement.style.setProperty('--accent-glow', currentAccentGlow);

  openSettings();
  triggerToast("System Calibrated", "Restored standard default coordinate matrix.");
}

function updatePersonaUI() {
  const titles = {
    friendly: `😊 Hinglish Dost Mode`,
    coder: `💻 Algorithm Architect Mode`,
    writer: `✍️ Creative Matrix Mode`,
    expert: `🎓 System Consultant Mode`
  };
  document.getElementById("activePersonaHeader").textContent = titles[currentPersona] || titles.friendly;
}

function updateEngineUI() {
  const engineLabel = document.getElementById("activeEngineLabel");
  const engineSub = document.getElementById("activeEngineSub");
  const bottomIcon = document.getElementById("bottom-icon");

  if (activeEngine === "gemini") {
    engineLabel.textContent = "MR7 Quantum";
    engineSub.textContent = "Synthesis Core v4.2";
    bottomIcon.innerHTML = `<i class="fas fa-brain text-sm"></i>`;
  } else {
    engineLabel.textContent = "MR7 Velocity";
    engineSub.textContent = "Speed Core v4.2";
    bottomIcon.innerHTML = `<i class="fas fa-bolt text-sm"></i>`;
  }
}

function toggleTheme() {
  isLightMode = !isLightMode;
  localStorage.setItem("mr7_v4_theme", isLightMode ? "light" : "dark");
  document.body.classList.toggle("light", isLightMode);
  document.getElementById("themeBtn").textContent = isLightMode ? "🌙 Dark" : "☀️ Light";
  triggerToast("Glow Spectrum", isLightMode ? "Adapted Solar Light panel theme." : "Adapted Deep Space panel theme.");
}

function toggleVisuals() {
  is3DActive = !is3DActive;
  localStorage.setItem("mr7_v4_3d", is3DActive);
  const canvas = document.getElementById("bg-canvas");
  canvas.style.opacity = is3DActive ? "0.35" : "0";
  
  const btn = document.getElementById("visualToggleBtn");
  if (is3DActive) {
    btn.innerHTML = `<i class="fas fa-expand"></i> <span class="hidden md:inline">3D Effects On</span>`;
    btn.className = "text-gray-400 hover:text-white bg-white/5 border border-white/5 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 transition-colors";
  } else {
    btn.innerHTML = `<i class="fas fa-compress text-red-400"></i> <span class="hidden md:inline">3D Effects Off</span>`;
    btn.className = "text-red-400 border border-red-500/20 bg-red-500/5 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1.5 transition-colors";
  }
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

/* ---------- 3D Space Particle Engine (Three.js WebGL) ---------- */
function init3DSpace() {
  const canvas = document.getElementById("bg-canvas");
  const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Optimized for mobiles
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 60;

  // Reduced particle count slightly for extreme mobile performance smoothness
  const particleCount = window.innerWidth < 768 ? 350 : 700;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);

  for (let i = 0; i < particleCount * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 150;     
    positions[i + 1] = (Math.random() - 0.5) * 150; 
    positions[i + 2] = (Math.random() - 0.5) * 150; 
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({
    color: 0x10a37f,
    size: 0.65,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending
  });

  const pointsMesh = new THREE.Points(geometry, material);
  scene.add(pointsMesh);

  // Torque Matrix geometry knot
  const geoMatrix = new THREE.TorusKnotGeometry(10, 1.3, 80, 10);
  const matMatrix = new THREE.MeshBasicMaterial({
    color: 0x10a37f,
    wireframe: true,
    transparent: true,
    opacity: 0.04
  });
  const matrixMesh = new THREE.Mesh(geoMatrix, matMatrix);
  scene.add(matrixMesh);

  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  // Smooth Touch interaction on Canvas for mobile users
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
      mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
    }
  });

  function renderLoop() {
    requestAnimationFrame(renderLoop);
    
    pointsMesh.rotation.y += 0.0003;
    pointsMesh.rotation.x += 0.0001;

    matrixMesh.rotation.y -= 0.0009;
    matrixMesh.rotation.x += 0.0006;

    camera.position.x += (mouseX * 10 - camera.position.x) * 0.03;
    camera.position.y += (-mouseY * 10 - camera.position.y) * 0.03;
    camera.lookAt(scene.position);

    material.color.setHex(parseInt(currentAccent.replace("#", "0x"), 16));
    matMatrix.color.setHex(parseInt(currentAccent.replace("#", "0x"), 16));

    renderer.render(scene, camera);
  }

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  renderLoop();
}
